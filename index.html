<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Practice</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .container { padding: 20px; border: 1px solid #ccc; display: inline-block; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello Git!</h1>
        <p>This is a simple file to practice Git and GitHub PRs.</p>
        <button id="actionBtn">Click Me</button>
        
        <hr style="margin: 20px 0;">
        
        <div id="loginSection">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Username" style="margin-bottom: 10px; padding: 5px;"><br>
            <input type="password" id="password" placeholder="Password" style="margin-bottom: 10px; padding: 5px;"><br>
            <button id="loginBtn" style="padding: 5px 15px;">Login</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
